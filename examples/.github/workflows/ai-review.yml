name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, review_requested]
    # Ahorra minutos de runner: no dispara el review en cambios que no son código.
    # Ajustá esta lista a tu proyecto (agregá/quitá globs según necesites).
    paths-ignore:
      - '**/*.md'
      - '**/*.mdx'
      - '**/*.lock'
      - 'package-lock.json'
      - 'yarn.lock'
      - 'pnpm-lock.yaml'
      - '**/*.png'
      - '**/*.jpg'
      - '**/*.svg'
      - 'docs/**'

# Si se pushea varias veces seguidas, cancela los reviews en curso y corre
# solo el último. Clave para no apilar runs y quemar minutos de CI.
concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Saltar drafts (cambiar a `false` para revisar drafts también)
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      # Necesarios para que el bot pueda postear reviews y comentarios
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Necesitamos al menos el commit base para que git diff funcione
          # si querés correr review-diff localmente; review-pr usa la API.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run AI Code Review
        run: npx -y ai-code-reviewer@latest review-pr
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Opcional: usar un modelo distinto
          # AI_REVIEWER_MODEL: gpt-4o
